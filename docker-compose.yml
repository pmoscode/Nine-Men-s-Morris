services:
  muehle:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - muehle-data:/app/data
    environment:
      - DB_PATH=/app/data/muehle.db
      - PORT=${PORT:-8080}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-}
    restart: unless-stopped

volumes:
  muehle-data:
