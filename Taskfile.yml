version: '3'

vars:
  TW_OS:
    sh: |
      case "$(uname -s)" in
        Darwin) echo "macos" ;;
        Linux)  echo "linux" ;;
        *)      echo "linux" ;;
      esac
  TW_ARCH:
    sh: |
      case "$(uname -m)" in
        x86_64)          echo "x64"   ;;
        arm64|aarch64)   echo "arm64" ;;
        *)               echo "x64"   ;;
      esac

tasks:
  upgrade:
    desc: Update Go modules
    cmd: go get -u ./...

  tw:install:
    desc: Download TailwindCSS standalone binary
    cmds:
      - mkdir -p bin
      - curl -sLo bin/tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-{{.TW_OS}}-{{.TW_ARCH}}
      - chmod +x bin/tailwindcss
    status:
      - test -f bin/tailwindcss

  tw:build:
    desc: Generate CSS once (minified)
    deps: [tw:install]
    cmds:
      - ./bin/tailwindcss -i static/css/input.css -o static/css/app.css --minify

  tw:watch:
    desc: Generate CSS in watch mode (development)
    deps: [tw:install]
    cmds:
      - ./bin/tailwindcss -i static/css/input.css -o static/css/app.css --watch

  build:
    desc: Build Go binary
    deps: [tw:build]
    cmds:
      - go build -o bin/muehle ./...

  run:
    desc: Start application locally
    deps: [tw:build]
    cmds:
      - go run ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  lint:
    desc: Run linter (requires golangci-lint)
    cmds:
      - golangci-lint run
